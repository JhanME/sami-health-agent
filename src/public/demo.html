<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eva — Demo Day</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      max-width: 480px;
      width: 100%;
      padding: 40px 32px;
    }
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header h1 {
      color: #1a5276;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .header p {
      color: #5d6d7e;
      font-size: 15px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #d5dbdb;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus {
      border-color: #1a5276;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #1a5276;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    button:hover { background: #154360; }
    button:disabled {
      background: #85929e;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 20px;
      padding: 16px;
      border-radius: 10px;
      font-size: 15px;
      line-height: 1.5;
      text-align: center;
      display: none;
    }
    .msg.success {
      background: #d5f5e3;
      color: #1e8449;
      display: block;
    }
    .msg.info {
      background: #d6eaf8;
      color: #1a5276;
      display: block;
    }
    .msg.error {
      background: #fadbd8;
      color: #c0392b;
      display: block;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Eva — Acompa&ntilde;amiento Oncol&oacute;gico Inteligente</h1>
      <p>Reg&iacute;strate para probar a Eva por WhatsApp</p>
    </div>

    <form id="demoForm">
      <div class="form-group">
        <label for="name">Nombre completo</label>
        <input type="text" id="name" placeholder="Ej: Mar&iacute;a Torres" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="phone">N&uacute;mero de celular</label>
        <input type="tel" id="phone" placeholder="Ej: 987654321" required autocomplete="tel">
      </div>
      <button type="submit" id="submitBtn">Registrarme</button>
    </form>

    <div id="message" class="msg"></div>
  </div>

  <script>
    const form = document.getElementById('demoForm');
    const msgEl = document.getElementById('message');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgEl.className = 'msg';
      btn.disabled = true;
      btn.textContent = 'Registrando...';

      try {
        const res = await fetch('/demo/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('name').value.trim(),
            phone: document.getElementById('phone').value.trim(),
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          msgEl.textContent = data.error || 'Error al registrarte.';
          msgEl.className = 'msg error';
          btn.disabled = false;
          btn.textContent = 'Registrarme';
          return;
        }

        if (data.already_registered) {
          msgEl.textContent = 'Este n\u00famero ya est\u00e1 registrado. Env\u00eda un mensaje a Eva por WhatsApp para continuar.';
          msgEl.className = 'msg info';
          btn.disabled = false;
          btn.textContent = 'Registrarme';
          return;
        }

        // Success
        form.classList.add('hidden');
        msgEl.innerHTML = '<strong>\u00a1Registro exitoso!</strong><br><br>' + data.message;
        msgEl.className = 'msg success';
      } catch (err) {
        msgEl.textContent = 'Error de conexi\u00f3n. Intenta de nuevo.';
        msgEl.className = 'msg error';
        btn.disabled = false;
        btn.textContent = 'Registrarme';
      }
    });
  </script>
</body>
</html>
